name: Android CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
      - ".idea/**"
      - ".gitignore"
      - ".gitmodules"

  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'jetbrains'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Check lint
      run: ./gradlew lintFdroidDebug lintGoogleDebug

    - name: Build debug artifacts
      run: ./gradlew assembleDebug

    - name: Run local tests
      run: ./gradlew testFdroidDebug testGoogleDebug

    - name: Upload debug artifact
      uses: actions/upload-artifact@v4
      with:
        name: fdroidDebug
        path: app/build/outputs/apk/fdroid/debug/app-fdroid-debug.apk
        retention-days: 30

    - name: Upload build reports
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: app/build/reports
        retention-days: 30

  detekt:
    # Ensure this job does not run on scheduled nightly builds
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check detekt
        run: ./gradlew detekt

      - name: Upload build reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: app/build/reports
          retention-days: 30

  androidTest:
    # Ensure this job does not run on scheduled nightly builds
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        api-level: [26, 35]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - uses: reactivecircus/android-emulator-runner@v2
        env:
            ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 60
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics -camera-back none
          disable-animations: true
          script: ./gradlew connectedFdroidDebugAndroidTest && killall -INT crashpad_handler || true

  nightly_release:
    name: Nightly Release
    runs-on: ubuntu-latest
    # Only run on scheduled events on the main branch
    if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
    needs: [build] # Ensure build job completes successfully, though build job currently doesn't build nightlies. Let's remove this dependency for now.
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Build Nightly APK and AAB
        run: |
          ./gradlew assembleFdroidNightly bundleGoogleNightly

      - name: List build artifacts
        run: |
          ls -R app/build/outputs/apk/fdroid/nightly/
          ls -R app/build/outputs/bundle/googleNightly/ # AABs are typically here

      - name: Create Nightly GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly-${{ env.DATE }}
          name: Nightly Build ${{ env.DATE }}
          body: |
            Nightly build for ${{ env.DATE }}.
            These builds are generated automatically and may be unstable.
          draft: false
          prerelease: true
          files: |
            app/build/outputs/apk/fdroid/nightly/app-fdroid-nightly.apk
            app/build/outputs/bundle/googleNightly/app-google-nightly.aab
